name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag or release version (for example v1.4.1)"
        required: true
        default: "v1.4.1"
      release_name:
        description: "Release title"
        required: true
        default: "Zapret Hub 1.4.1"

jobs:
  prepare-release:
    runs-on: windows-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      name: ${{ steps.meta.outputs.name }}
      body_file: ${{ steps.meta.outputs.body_file }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
            $name = "${{ inputs.release_name }}"
          } else {
            $tag = "${{ github.ref_name }}"
            $name = ""
          }
          $version = $tag.TrimStart('v')
          if ([string]::IsNullOrWhiteSpace($name)) {
            $name = "Zapret Hub $version"
          }
          $bodyFile = ".github/release-notes/$version.md"
          if (-not (Test-Path $bodyFile)) {
            throw "Release notes file not found: $bodyFile"
          }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "name=$name" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "body_file=$bodyFile" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

  build-x64:
    needs: prepare-release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Build x64 application
        shell: pwsh
        run: python -m PyInstaller -y .\packaging\zapret_hub.spec

      - name: Upload x64 build
        uses: actions/upload-artifact@v4
        with:
          name: zapret-hub-x64
          path: dist/zapret_hub/**
          if-no-files-found: error

  build-arm64:
    needs: prepare-release
    runs-on: windows-11-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Build ARM64 application
        shell: pwsh
        run: python -m PyInstaller -y .\packaging\zapret_hub.spec

      - name: Upload ARM64 build
        uses: actions/upload-artifact@v4
        with:
          name: zapret-hub-arm64
          path: dist/zapret_hub/**
          if-no-files-found: error

  release-windows:
    needs:
      - prepare-release
      - build-x64
      - build-arm64
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Download x64 build
        uses: actions/download-artifact@v4
        with:
          name: zapret-hub-x64
          path: dist/zapret_hub

      - name: Download ARM64 build
        uses: actions/download-artifact@v4
        with:
          name: zapret-hub-arm64
          path: .release_cache/win_arm64

      - name: Prepare payload
        shell: pwsh
        run: python .\_refresh_release.py

      - name: Build installer
        shell: pwsh
        run: python -m PyInstaller -y .\packaging\install_zaprethub.spec

      - name: Refresh release files
        shell: pwsh
        env:
          ZAPRET_HUB_RELEASE_UNIVERSAL: "1"
        run: python .\_refresh_release.py

      - name: SignPath placeholder
        shell: pwsh
        run: .\scripts\signpath_stub.ps1 -InputPath ".\dist\zapret_hub\zapret_hub.exe"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          name: ${{ needs.prepare-release.outputs.name }}
          body_path: ${{ needs.prepare-release.outputs.body_file }}
          files: |
            release_1.4.1/install_zaprethub_1.4.1_Universal.exe
            release_1.4.1/*.zip
