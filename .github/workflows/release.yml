name: Release Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag or release version (for example v1.4.2)"
        required: true
        default: "v1.4.2"
      release_name:
        description: "Release title"
        required: true
        default: "Zapret Hub 1.4.2"
      changelog:
        description: "Release changelog"
        required: true

jobs:
  build-windows-x64:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Clean workspace
        shell: pwsh
        run: |
          Remove-Item .\dist_nuitka -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item .\.nuitka_staging -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item .\installer_payload -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item .\release_1.4.2 -Recurse -Force -ErrorAction SilentlyContinue

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        env:
          PIP_PREFER_BINARY: "1"
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Build Nuitka x64
        shell: pwsh
        run: .\scripts\build_nuitka.ps1 -Python python -OutputDir dist_nuitka -Compiler zig

      - name: Upload x64 artifact
        uses: actions/upload-artifact@v6
        with:
          name: nuitka-win-x64
          path: dist_nuitka/main.dist/**
          if-no-files-found: error

  build-windows-arm64:
    runs-on: windows-11-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Clean workspace
        shell: pwsh
        run: |
          Remove-Item .\dist_nuitka -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item .\.nuitka_staging -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item .\installer_payload -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item .\release_1.4.2 -Recurse -Force -ErrorAction SilentlyContinue

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Rust fallback
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        shell: pwsh
        env:
          PIP_PREFER_BINARY: "1"
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Build Nuitka arm64
        shell: pwsh
        run: .\scripts\build_nuitka.ps1 -Python python -OutputDir dist_nuitka -Compiler msvc

      - name: Upload arm64 artifact
        uses: actions/upload-artifact@v6
        with:
          name: nuitka-win-arm64
          path: dist_nuitka/main.dist/**
          if-no-files-found: error

  package-release:
    needs:
      - build-windows-x64
      - build-windows-arm64
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Clean workspace
        shell: pwsh
        run: |
          Remove-Item .\dist_nuitka -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item .\dist_installer -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item .\.nuitka_staging -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item .\.artifacts -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item .\installer_payload -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item .\release_1.4.2 -Recurse -Force -ErrorAction SilentlyContinue

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        env:
          PIP_PREFER_BINARY: "1"
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Download x64 artifact
        uses: actions/download-artifact@v5
        with:
          name: nuitka-win-x64
          path: .artifacts/win_x64

      - name: Download arm64 artifact
        uses: actions/download-artifact@v5
        with:
          name: nuitka-win-arm64
          path: .artifacts/win_arm64

      - name: Prepare release payloads
        shell: pwsh
        run: >
          python .\scripts\prepare_nuitka_release.py
          --x64-source .\.artifacts\win_x64
          --arm64-source .\.artifacts\win_arm64
          --payload-dir .\installer_payload
          --release-dir .\release_1.4.2
          --version 1.4.2

      - name: Build universal installer
        shell: pwsh
        run: .\scripts\build_nuitka_installer.ps1 -Python python -PayloadDir installer_payload -OutputDir dist_installer

      - name: Place installer into release folder
        shell: pwsh
        run: Copy-Item .\dist_installer\install_zaprethub_1.4.2_universal.exe .\release_1.4.2\ -Force

      - name: Prepare release notes body
        shell: pwsh
        run: Copy-Item .\.github\release-notes\1.4.2.md .\.release_body.md -Force

      - name: SignPath placeholder
        shell: pwsh
        run: .\scripts\signpath_stub.ps1 -InputPath ".\.artifacts\win_x64\zapret_hub.exe"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.release_name }}
          body_path: .\.release_body.md
          files: |
            release_1.4.2/install_zaprethub_1.4.2_universal.exe
            release_1.4.2/*portable*.zip
