name: CI Build

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:
  workflow_dispatch:

jobs:
  build-windows-x64:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        env:
          PIP_PREFER_BINARY: "1"
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Build Nuitka x64
        shell: pwsh
        run: .\scripts\build_nuitka.ps1 -Python python -OutputDir dist_nuitka

      - name: Prepare release payloads
        shell: pwsh
        run: >
          python .\scripts\prepare_nuitka_release.py
          --x64-source .\dist_nuitka\main.dist
          --arm64-source .\.release_cache\win_arm64
          --payload-dir .\installer_payload
          --release-dir .\release_1.4.3
          --version 1.4.3

      - name: Build universal installer
        shell: pwsh
        run: .\scripts\build_nuitka_installer.ps1 -Python python -PayloadDir installer_payload -OutputDir dist_installer -SkipPrepareRelease

      - name: Place installer into release folder
        shell: pwsh
        run: Copy-Item .\dist_installer\install_zaprethub_1.4.3_universal.exe .\release_1.4.3\ -Force

      - name: SignPath placeholder
        shell: pwsh
        run: .\scripts\signpath_stub.ps1 -InputPath ".\dist_nuitka\main.dist\zapret_hub.exe"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: zapret-hub-ci-windows
          path: |
            dist_nuitka/main.dist/**
            dist_installer/install_zaprethub_1.4.3_universal.exe
            release_1.4.3/**
          if-no-files-found: error
